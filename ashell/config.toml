# =============================================================================
# Ashell config.toml
# Translated from Waybar setup (modules.json + config.jsonc + style.css)
# =============================================================================

log_level = "warn"

# Bar position — your Waybar was at the bottom
position = "Bottom"

# Display outputs — your Waybar targeted eDP-1 and HDMI-A-1
# Change to { Targets = ["eDP-1", "HDMI-A-1"] } if you want to restrict
outputs = "All"

# =============================================================================
# Modules layout
# Replicates your Waybar sections:
#   left:   exit button | clock | media player group
#   center: workspaces
#   right:  hardware group | notifications
#
# NOTE: Ashell does not support a dedicated "exit/logout" button in the left
# section. That functionality is covered by the Settings module (right side),
# which includes logout, shutdown, reboot, and suspend options.
# The Updates module replaces your custom/upgrades script.
# MediaPlayer replaces your custom/media + playerctl group.
# =============================================================================

[modules]
left   = [ "Tempo", "MediaPlayer" ]
center = [ "Workspaces" ]
right  = [ "SystemInfo", "Settings", "Notifications"]

# =============================================================================
# Workspaces
# Your Waybar used persistent workspaces on two monitors.
# Ashell handles this with visibility_mode and group_by_monitor.
# =============================================================================

[workspaces]
visibility_mode          = "MonitorSpecificExclusive"   # Each monitor shows its own workspaces
group_by_monitor         = true
enable_workspace_filling = false
max_workspaces           = 10 # Matches your 1-5 (eDP-1) + 6-10 (HDMI-A-1)

# =============================================================================
# Updates
# Replaces your custom/upgrades script.
# Adjust check_cmd and update_cmd to match your package manager.
# =============================================================================

[updates]
check_cmd  = "checkupdates; paru -Qua"
update_cmd = 'alacritty -e bash -c "paru; echo Done - Press enter to exit; read" &'
interval   = 3600

# =============================================================================
# Tempo (Clock)
# Replaces your Waybar clock module.
# Format mirrors: "Wednesday, June 12, 2026 (14:30)"
# =============================================================================

[tempo]
clock_format      = "%a %d %b %R"

# =============================================================================
# System Info
# Replaces your cpu, memory, temperature, backlight, and battery modules.
# =============================================================================

[system_info]
indicators = [ "Cpu", "Memory", "Temperature" ]
interval   = 5

[system_info.cpu]
warn_threshold  = 60
alert_threshold = 80

[system_info.memory]
warn_threshold  = 70
alert_threshold = 85
format = "Fraction"   # Shows "used/total" like your "{used:0.1f}G/{total:0.1f}G"

[system_info.temperature]
warn_threshold  = 60
alert_threshold = 80
sensor = "Cpu"

# =============================================================================
# Media Player
# Replaces your custom/media + custom/media-prev + custom/media-next group.
# Ashell's MediaPlayer module handles play/pause/next/prev natively.
# =============================================================================

[media_player]
max_title_length  = 30
indicator_format  = "IconAndTitle"

# =============================================================================
# Notifications
# Replaces your custom/notification (swaync-client) module.
# Ashell has a built-in notification center (Privacy module in the right group).
# =============================================================================

[notifications]
format           = "%H:%M"
show_timestamps  = true
show_bodies      = true
toast            = true
toast_position   = "bottom_right"   # Matches your bottom bar position
toast_timeout    = 3000

# =============================================================================
# Settings panel
# This is where logout/shutdown lives in Ashell, replacing your custom/exit.
# Also contains audio (pulseaudio), network, backlight, battery, power profile.
# =============================================================================

[settings]
# Commands — adjust to your session manager
lock_cmd = "playerctl --all-players pause; hyprlock &"
logout_cmd            = "loginctl kill-user $(whoami)"
shutdown_cmd          = "shutdown now"
reboot_cmd            = "systemctl reboot"
suspend_cmd           = "systemctl suspend"

# Replaces your pavucontrol on-click
audio_sinks_more_cmd  = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
audio_indicator_format = "IconAndPercentage"

# Replaces your wifi_menu.sh on-click
wifi_more_cmd         = "nm-connection-editor"

# Battery display — matches your "{capacity}% {icon}" format
battery_format        = "IconAndPercentage"

bluetooth_indicator_format = "IconAndValue"

brightness_indicator_format = "IconAndPercentage"

# Status indicators shown inside the Settings pill
# Mirrors: power-profiles-daemon | network | backlight | battery | audio
indicators = [
  "PowerProfile",
  "Network",
  "Brightness",
  "Audio",
  "Battery",
]

# =============================================================================
# OSD (On-Screen Display)
# Optional overlay for volume/brightness changes
# =============================================================================

[osd]
enabled                   = true
timeout                   = 1500
show_volume_percentage    = true
show_brightness_percentage = true

# =============================================================================
# Animations
# =============================================================================

[animations]
enabled = true

# =============================================================================
# Appearance
# Colors ported directly from your style.css (Tokyo Night palette)
# Style "Islands" matches your rounded pill/card look with gaps between modules
# =============================================================================

[appearance]
style         = "Islands"     # Rounded pill modules, matches your border-radius: 8px style
font_name     = "Ubuntu Nerd Font"
primary_color = "#7aa2f7"     # Blue  — workspaces active, pulseaudio, network
success_color = "#9ece6a"     # Green — battery good, clock
warning_color = "#e0af68"     # Orange — backlight, notification
danger_color  = "#f7768e"     # Red — battery critical, exit button, urgent workspace
text_color    = "#c0caf5"     # Default foreground

# Workspace dot colors — active and visible states
workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.background_color]
base   = "#1a1b26"   # window#waybar / #workspaces background
weak   = "#24283b"   # module background (#battery, #cpu, etc.)
strong = "#414868"   # muted/disconnected states (#pulseaudio.muted, #network.disconnected)

[appearance.menu]
opacity = 0.7
