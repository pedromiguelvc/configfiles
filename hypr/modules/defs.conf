$mainMonitor = eDP-1
$secondaryMonitor = HDMI-A-1

# monitor=,preferred,auto,auto
monitor=$mainMonitor, 1920x1080@60.00, 0x0,1
monitor=$secondaryMonitor, preferred, auto-center-up, 1
# monitor=$secondaryMonitor, preferred, auto, 1, mirror, $mainMonitor # MIRROR

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
$fileManager = thunar
$browser = google-chrome
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

exec-once = ashell
exec-once = nm-applet
exec-once = blueman-applet
exec-once = hyprpaper
exec-once = hypridle
exec-once = gammastep
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = hyprctl setcursor BreezeX-RosePine-Linux 24
exec-once = hyprpm reload

exec-once = [workspace 1 silent] $browser
exec-once = [workspace 2 silent] $terminal
exec-once = [workspace 3 silent] $browser

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = HYPRCURSOR_THEME,BreezeX-RosePine-Linux
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_DATA_DIRS,/usr/local/share:/usr/share
