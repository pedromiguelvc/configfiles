###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

$mainMod = SUPER # Sets "Windows" key as main modifier
$mainModShift = SUPER_SHIFT

# Just for master layout
bind = $mainMod, Space, layoutmsg, swapwithmaster

# Rofis
bind = $mainMod, Return, exec, $menu
bind = $mainMod, F, exec, $fileBrowser
bind = $mainMod, W, exec, $windowManager
bind = $mainMod, C, exec, $calculator

bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, M, exec, $powerManager

bind = $mainMod, Q, killactive
bind = $mainMod, S, togglefloating
bind = $mainModShift, S, fullscreen, 1
bind = , F11, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, H, alterzorder, top
bind = $mainMod, L, movefocus, r
bind = $mainMod, L, alterzorder, top
bind = $mainMod, K, movefocus, u
bind = $mainMod, K, alterzorder, top
bind = $mainMod, J, movefocus, d
bind = $mainMod, J, alterzorder, top

# Move between monitors
bind = $mainModShift, K, movewindow, mon:+1
bind = $mainModShift, J, movewindow, mon:-1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, Next, workspace, r+1
bind = $mainMod, Prior, workspace, r-1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod, 0, workspace, prev

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainModShift, Next, movetoworkspace, +1
bind = $mainModShift, Prior, movetoworkspace, -1
bind = $mainModShift, 1, movetoworkspace, 1
bind = $mainModShift, 2, movetoworkspace, 2
bind = $mainModShift, 3, movetoworkspace, 3
bind = $mainModShift, 4, movetoworkspace, 4
bind = $mainModShift, 5, movetoworkspace, 5
bind = $mainModShift, 6, movetoworkspace, 6
bind = $mainModShift, 7, movetoworkspace, 7
bind = $mainModShift, 8, movetoworkspace, 8
bind = $mainModShift, 9, movetoworkspace, 9
bind = $mainModShift, 0, movetoworkspace, 10

bind = , Print, exec, hyprshot --clipboard-only -m region
bind = SHIFT, Print, exec, hyprshot -m window

bind = $mainMod, G, togglegroup
bind = $mainModShift, G, moveoutofgroup
bind = $mainMod, Tab, changegroupactive, f
bind = $mainModShift, Tab, changegroupactive, b

bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, bash -c 'val=$(brightnessctl g); max=$(brightnessctl m); step=$((max/5)); min=$step; new=$((val-step)); [ $new -lt $min ] && new=$min; brightnessctl s $new' # Limit it to 10%

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

